name: Set project status In Progress on PR

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  contents: read
  issues: read
  pull-requests: read
  repository-projects: write

jobs:
  update-project-status:
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Progress
        uses: actions/github-script@v7
        env:
          PROJECT_BOARD_NUMBER: ${{ vars.PROJECT_BOARD_NUMBER }}
          PROJECT_BOARD_TITLE: ${{ vars.PROJECT_BOARD_TITLE }}
        with:
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const boardNumber = process.env.PROJECT_BOARD_NUMBER
              ? Number(process.env.PROJECT_BOARD_NUMBER)
              : null;
            const boardTitle = (process.env.PROJECT_BOARD_TITLE || repo).trim();
            const normalize = (value) => (value || "").trim().toLowerCase();

            async function resolveProject() {
              if (Number.isInteger(boardNumber) && boardNumber > 0) {
                const byNumber = await github.graphql(
                  `
                  query($owner:String!, $number:Int!) {
                    repositoryOwner(login:$owner) {
                      ... on User {
                        projectV2(number:$number) {
                          id
                          title
                          fields(first:50) {
                            nodes {
                              ... on ProjectV2SingleSelectField {
                                id
                                name
                                options { id name }
                              }
                            }
                          }
                        }
                      }
                      ... on Organization {
                        projectV2(number:$number) {
                          id
                          title
                          fields(first:50) {
                            nodes {
                              ... on ProjectV2SingleSelectField {
                                id
                                name
                                options { id name }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                  `,
                  { owner, number: boardNumber }
                );

                const project = byNumber.repositoryOwner?.projectV2 || null;
                if (!project) {
                  throw new Error(
                    `PROJECT_BOARD_NUMBER=${boardNumber} is set, but project was not found for owner ${owner}`
                  );
                }
                return project;
              }

              const byTitle = await github.graphql(
                `
                query($owner:String!, $first:Int!) {
                  repositoryOwner(login:$owner) {
                    ... on User {
                      projectsV2(first:$first) {
                        nodes {
                          id
                          title
                          fields(first:50) {
                            nodes {
                              ... on ProjectV2SingleSelectField {
                                id
                                name
                                options { id name }
                              }
                            }
                          }
                        }
                      }
                    }
                    ... on Organization {
                      projectsV2(first:$first) {
                        nodes {
                          id
                          title
                          fields(first:50) {
                            nodes {
                              ... on ProjectV2SingleSelectField {
                                id
                                name
                                options { id name }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
                `,
                { owner, first: 100 }
              );

              const projects = (byTitle.repositoryOwner?.projectsV2?.nodes || []).filter(Boolean);

              const project = projects.find((p) => normalize(p.title) === normalize(boardTitle));
              if (!project) {
                throw new Error(
                  `Project board "${boardTitle}" was not found for owner ${owner}. ` +
                    `Set repository variable PROJECT_BOARD_NUMBER or create board "${repo}".`
                );
              }

              return project;
            }

            const project = await resolveProject();

            const statusField = project.fields.nodes.find((f) => f && f.name === "Status");
            if (!statusField) {
              core.setFailed(`Status field not found in project "${project.title}"`);
              return;
            }

            const inProgressOption = statusField.options.find((o) => o.name === "In Progress");
            if (!inProgressOption) {
              core.setFailed(`Status option "In Progress" not found in project "${project.title}"`);
              return;
            }

            const prData = await github.graphql(
              `
              query($owner:String!, $repo:String!, $pull_number:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$pull_number) {
                    number
                    closingIssuesReferences(first:50) {
                      nodes {
                        id
                        number
                        projectItems(first:20) {
                          nodes {
                            id
                            project {
                              id
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
              `,
              { owner, repo, pull_number }
            );

            const issues = prData.repository?.pullRequest?.closingIssuesReferences?.nodes || [];
            core.info(`Linked closing issues: ${issues.length}`);
            if (issues.length === 0) {
              return;
            }

            for (const issue of issues) {
              let projectItemId =
                issue.projectItems.nodes.find((n) => n.project.id === project.id)?.id || null;

              if (!projectItemId) {
                const addItem = await github.graphql(
                  `
                  mutation($projectId:ID!, $contentId:ID!) {
                    addProjectV2ItemById(input: { projectId:$projectId, contentId:$contentId }) {
                      item {
                        id
                      }
                    }
                  }
                  `,
                  { projectId: project.id, contentId: issue.id }
                );
                projectItemId = addItem.addProjectV2ItemById.item.id;
              }

              await github.graphql(
                `
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(
                    input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }
                  ) {
                    projectV2Item {
                      id
                    }
                  }
                }
                `,
                {
                  projectId: project.id,
                  itemId: projectItemId,
                  fieldId: statusField.id,
                  optionId: inProgressOption.id,
                }
              );

              core.info(`Issue #${issue.number} moved to In Progress`);
            }
