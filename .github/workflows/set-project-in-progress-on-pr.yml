name: Set project status In Progress on PR

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: read
  pull-requests: read
  repository-projects: write

jobs:
  update-project-status:
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Progress
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const projectNumber = 2;

            const projectData = await github.graphql(
              `
              query($owner:String!, $projectNumber:Int!) {
                user(login:$owner) {
                  projectV2(number:$projectNumber) {
                    id
                    fields(first:50) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
              `,
              { owner, projectNumber }
            );

            const project = projectData.user?.projectV2;
            if (!project) {
              core.setFailed(`Project #${projectNumber} not found for user ${owner}`);
              return;
            }

            const statusField = project.fields.nodes.find(
              (f) => f && f.name === "Status"
            );
            if (!statusField) {
              core.setFailed("Status field not found in project");
              return;
            }

            const inProgressOption = statusField.options.find(
              (o) => o.name === "In Progress"
            );
            if (!inProgressOption) {
              core.setFailed('Status option "In Progress" not found');
              return;
            }

            const prData = await github.graphql(
              `
              query($owner:String!, $repo:String!, $pull_number:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$pull_number) {
                    number
                    closingIssuesReferences(first:50) {
                      nodes {
                        id
                        number
                        projectItems(first:20) {
                          nodes {
                            id
                            project {
                              id
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
              `,
              { owner, repo, pull_number }
            );

            const issues = prData.repository?.pullRequest?.closingIssuesReferences?.nodes || [];
            core.info(`Linked closing issues: ${issues.length}`);
            if (issues.length === 0) {
              return;
            }

            for (const issue of issues) {
              let projectItemId =
                issue.projectItems.nodes.find((n) => n.project.id === project.id)?.id || null;

              if (!projectItemId) {
                const addItem = await github.graphql(
                  `
                  mutation($projectId:ID!, $contentId:ID!) {
                    addProjectV2ItemById(input: { projectId:$projectId, contentId:$contentId }) {
                      item {
                        id
                      }
                    }
                  }
                  `,
                  { projectId: project.id, contentId: issue.id }
                );
                projectItemId = addItem.addProjectV2ItemById.item.id;
              }

              await github.graphql(
                `
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(
                    input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }
                  ) {
                    projectV2Item {
                      id
                    }
                  }
                }
                `,
                {
                  projectId: project.id,
                  itemId: projectItemId,
                  fieldId: statusField.id,
                  optionId: inProgressOption.id,
                }
              );

              core.info(`Issue #${issue.number} moved to In Progress`);
            }
