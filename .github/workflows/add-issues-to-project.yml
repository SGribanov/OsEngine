name: Add issues to Tasks project

on:
  issues:
    types:
      - opened
      - reopened

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to GitHub Project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/SGribanov/projects/2
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT || github.token }}
