name: Feature Task
description: Планирование и выполнение фичи
title: "[Feature] "
labels:
  - type:feature
  - priority:medium
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Что нужно изменить и почему.
      placeholder: Бизнес-контекст, ограничения, ссылки
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Что входит в задачу.
      placeholder: Пункты реализации
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Критерии готовности.
      placeholder: "- [ ] ..."
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Как проверить результат.
      placeholder: Команды, тесты, сценарии ручной проверки
    validations:
      required: true

  - type: textarea
    id: links
    attributes:
      label: Links
      description: Связанные issue/PR/документы.
      placeholder: "Parent registry: https://github.com/SGribanov/Repos"
