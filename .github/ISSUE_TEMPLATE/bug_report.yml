name: Bug Report
description: Сообщение о баге
title: "[Bug] "
labels:
  - type:bug
  - priority:high
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Кратко опишите проблему.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Шаги воспроизведения.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Что ожидалось.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Что произошло фактически.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Версии/окружение.
      placeholder: OS, runtime, app version, commit SHA

  - type: textarea
    id: diagnostics
    attributes:
      label: Logs / Diagnostics
      description: Логи, трейс, скриншоты.
